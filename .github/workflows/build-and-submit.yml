name: Build & Submit to Google Play (Internal Testing)

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  EAS_PROFILE: production

jobs:
  build-and-submit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: Setup Expo authentication
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "Warning: EXPO_TOKEN not set. EAS build may require interactive authentication."
          fi

      - name: Build Android (EAS)
        run: eas build -p android --profile production --non-interactive

      - name: Wait for build to complete
        run: |
          BUILD_ID=$(eas build:list -p android --profile production --limit 1 --json | jq -r '.[0].id')
          echo "Build ID: $BUILD_ID"
          # Note: This is a simplified check; real implementation would poll the status

      - name: Download build artifact
        run: |
          # Download the latest Android build
          BUILD_ID=$(eas build:list -p android --profile production --limit 1 --json | jq -r '.[0].id')
          eas build:download --id $BUILD_ID --path ./app-release.aab

      - name: Submit to Google Play (Internal Testing)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.procedure.guide
          releaseFiles: './app-release.aab'
          track: internal
          status: completed

      - name: Notify on success
        if: success()
        run: echo "✅ Build successfully submitted to Google Play internal testing track!"

      - name: Notify on failure
        if: failure()
        run: echo "❌ Build failed. Check the logs above."
